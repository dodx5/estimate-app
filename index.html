<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見積書アプリ</title>

<style>
body {
  font-family: sans-serif;
  background:#eee;
  padding:10px;
}

h1 {
  text-align:center;
}

table {
  width:100%;
  border-collapse: collapse;
  background:#fff;
}

th, td {
  border:1px solid #000;
  padding:5px;
  font-size:12px;
  text-align:center;
}

input, select {
  width:100%;
  border:none;
  text-align:center;
}

.total {
  font-size:18px;
  font-weight:bold;
  text-align:right;
  margin-top:10px;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  font-size:16px;
}
</style>

</head>
<body>

<h1>御見積書</h1>

<table>
  <tr>
    <th>No</th>
    <th>作業内容</th>
    <th>区分</th>
    <th>数量</th>
    <th>単価</th>
    <th>金額</th>
  </tr>

  <!-- 1行目 -->
  <tr>
    <td>1</td>
    <td><input type="text"></td>
    <td>
      <select>
        <option>分解</option>
        <option>交換</option>
        <option>点検</option>
        <option>補充</option>
        <option>脱着</option>
        <option>塗装</option>
      </select>
    </td>
    <td><input type="number" oninput="calc()"></td>
    <td><input type="number" oninput="calc()"></td>
    <td class="price">0</td>
  </tr>

  <!-- 2行目 -->
  <tr>
    <td>2</td>
    <td><input type="text"></td>
    <td>
      <select>
        <option>分解</option>
        <option>交換</option>
        <option>点検</option>
        <option>補充</option>
        <option>脱着</option>
        <option>塗装</option>
      </select>
    </td>
    <td><input type="number" oninput="calc()"></td>
    <td><input type="number" oninput="calc()"></td>
    <td class="price">0</td>
  </tr>

  <!-- 3行目 -->
  <tr>
    <td>3</td>
    <td><input type="text"></td>
    <td>
      <select>
        <option>分解</option>
        <option>交換</option>
        <option>点検</option>
        <option>補充</option>
        <option>脱着</option>
        <option>塗装</option>
      </select>
    </td>
    <td><input type="number" oninput="calc()"></td>
    <td><input type="number" oninput="calc()"></td>
    <td class="price">0</td>
  </tr>

</table>

<div class="total">合計: <span id="total">0</span> 円</div>

<button onclick="window.print()">印刷 / PDF保存</button>

<script>
function calc(){
  let rows = document.querySelectorAll("table tr");
  let total = 0;

  rows.forEach((row, i)=>{
    if(i===0) return;

    let inputs = row.querySelectorAll("input");
    let qty = Number(inputs[1].value);
    let price = Number(inputs[2].value);

    let sum = qty * price;
    row.querySelector(".price").innerText = sum;

    total += sum;
  });

  document.getElementById("total").innerText = total;
}
</script>

</body>
</html>
