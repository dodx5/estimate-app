<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見積書アプリ</title>

<style>
body {
  font-family: sans-serif;
  background:#eee;
  padding:10px;
}

h1 {
  text-align:center;
}

.sheet {
  background:#fff;
  padding:10px;
  border:1px solid #000;
}

table {
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th, td {
  border:1px solid #000;
  padding:5px;
}

input, select {
  width:100%;
  border:none;
  font-size:12px;
}

.total {
  text-align:right;
  font-size:18px;
  margin-top:10px;
}
</style>

</head>

<body>

<h1>御見積書</h1>

<div class="sheet">

<table>
<tr>
  <td>顧客名</td>
  <td><input></td>
  <td>車種</td>
  <td><input></td>
</tr>
<tr>
  <td>住所</td>
  <td colspan="3"><input></td>
</tr>
</table>

<br>

<table id="table">
<tr>
  <th>No</th>
  <th>区分</th>
  <th>作業内容</th>
  <th>数量</th>
  <th>単価</th>
  <th>金額</th>
</tr>
</table>

<button onclick="addRow()">行追加</button>

<div class="total">
合計：<span id="total">0</span> 円
</div>

</div>

<script>

function addRow(){
  const table = document.getElementById("table");
  const row = table.insertRow();

  row.innerHTML = `
    <td>${table.rows.length - 1}</td>
    <td>
      <select>
        <option>分解</option>
        <option>交換</option>
        <option>点検</option>
        <option>補充</option>
        <option>脱着</option>
        <option>塗装</option>
      </select>
    </td>
    <td><input></td>
    <td><input type="number" oninput="calc(this)"></td>
    <td><input type="number" oninput="calc(this)"></td>
    <td><input readonly></td>
  `;
}

function calc(el){
  const row = el.parentNode.parentNode;
  const qty = row.cells[3].children[0].value;
  const price = row.cells[4].children[0].value;
  const total = qty * price || 0;

  row.cells[5].children[0].value = total;

  calcTotal();
}

function calcTotal(){
  const table = document.getElementById("table");
  let sum = 0;

  for(let i=1; i<table.rows.length; i++){
    const val = table.rows[i].cells[5].children[0].value;
    sum += Number(val) || 0;
  }

  document.getElementById("total").innerText = sum;
}

</script>

</body>
</html>
